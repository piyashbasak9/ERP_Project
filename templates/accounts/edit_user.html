{% extends 'base.html' %}
{% block title %}Edit User{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm">
            <div class="card-header bg-warning text-dark">
                <h4 class="mb-0">✏️ "{{ user.username }}" এডিট করুন</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">ব্যবহারকারীর নাম</label>
                            <input type="text" class="form-control" name="username" value="{{ user.username }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">ইমেইল</label>
                            <input type="email" class="form-control" name="email" value="{{ user.email }}" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">প্রথম নাম</label>
                            <input type="text" class="form-control" name="first_name" value="{{ user.first_name }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">শেষ নাম</label>
                            <input type="text" class="form-control" name="last_name" value="{{ user.last_name }}">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">রোল নির্বাচন করুন</label>
                        <select class="form-select" name="role_id">
                            <option value="">--------- কোন রোল নেই ---------</option>
                            {% for role_id, role_name in roles %}
                                <option value="{{ role_id }}" {% if role_id == current_role_id %}selected{% endif %}>{{ role_name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="is_staff" id="is_staff" {% if user.is_staff %}checked{% endif %}>
                                <label class="form-check-label" for="is_staff">স্ট্যাফ সদস্য</label>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="is_superuser" id="is_superuser" {% if user.is_superuser %}checked{% endif %}>
                                <label class="form-check-label" for="is_superuser">সুপার ইউজার</label>
                            </div>
                        </div>
                    </div>

                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary">💾 আপডেট করুন</button>
                        <a href="{% url 'accounts:list_users' %}" class="btn btn-outline-secondary">🔙 ফিরে যান</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
