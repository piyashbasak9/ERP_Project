{% extends 'base.html' %}
{% block title %}{% if pk %}Delete Branch{% else %}Add Branch{% endif %}{% endblock %}

{% block content %}
<div class="container-fluid" style="max-width:1000px; margin-top: 30px;">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">
            <i class="bi bi-diagram-3-fill me-2"></i>
            {% if pk %}Delete Branch{% else %}Add New Branch{% endif %}
        </h2>
        <a href="{% url 'branch:Module_Branch_index_branch' %}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>Back to List
        </a>
    </div>

    <div class="card mb-4 shadow-sm mx-auto">
        <div class="card-body">
            <form method="post" action="{% if pk %}{% url 'branch:Module_Branch_delete_branch' pk=pk %}{% else %}{% url 'branch:Module_Branch_add_branch' %}{% endif %}">
                {% csrf_token %}
                <p>Are you sure you want to delete this branch?</p>
                <div class="mt-4 d-flex gap-2">
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash me-1"></i>Delete
                    </button>
                    <a href="{% url 'branch:Module_Branch_index_branch' %}" class="btn btn-secondary">
                        <i class="bi bi-x-circle me-1"></i>Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>

</div>
{% endblock %}
