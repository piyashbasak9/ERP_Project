{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ERP Login</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <style>
        body{
            min-height:100vh;
            background:linear-gradient(135deg,#f8f9fa,#eef2f7);
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-card{
            width:100%;
            max-width:420px;
            border:none;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 15px 35px rgba(0,0,0,.12);
            transition:.3s;
            background:#fff;
        }

        .login-card:hover{
            transform:translateY(-5px);
        }

        .login-header{
            background:#0d6efd;
            color:white;
            padding:35px 20px;
            text-align:center;
        }

        .login-header i{
            font-size:65px;
        }

        .login-body{
            padding:35px;
        }

        .form-control{
            height:48px;
            border-radius:10px;
        }

        .btn-login{
            height:48px;
            border-radius:10px;
            font-weight:600;
        }

        .footer-text{
            color:#6c757d;
            text-align:center;
            padding-bottom:25px;
            font-size:14px;
        }

        label{
            font-weight:600;
            margin-bottom:6px;
        }

        ul.errorlist{
            list-style:none;
            padding:0;
            margin-bottom:10px;
            color:red;
            font-size:14px;
        }

        @media(max-width:576px){

            .login-body{
                padding:25px;
            }

            .login-header{
                padding:30px 15px;
            }

        }

    </style>

</head>

<body>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-lg-5 col-md-7 col-sm-10">

            <div class="card login-card">

                <!-- Header -->

                <div class="login-header">

                    <i class="bi bi-person-circle"></i>

                    <h3 class="mt-3 fw-bold">
                        Welcome Back
                    </h3>

                    <p class="mb-0">
                        Sign in to continue
                    </p>

                </div>

                <!-- Body -->

                <div class="login-body">

                    <form method="POST">

                        {% csrf_token %}

                        <!-- Username -->

                        <div class="mb-3">

                            <label>
                                Username
                            </label>

                            {{ form.username }}

                        </div>

                        <!-- Password -->

                        <div class="mb-4">

                            <label>
                                Password
                            </label>

                            {{ form.password }}

                        </div>

                        <button class="btn btn-primary btn-login w-100">

                            <i class="bi bi-box-arrow-in-right"></i>

                            Login

                        </button>

                    </form>

                </div>

                <!-- Footer -->

                <div class="footer-text">

                    © 2026 ERP Management System

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
